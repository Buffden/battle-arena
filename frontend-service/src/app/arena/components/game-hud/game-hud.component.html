<div class="game-hud" *ngIf="gameState">
  <!-- Player 1 (Left Side) -->
  <div class="hud-section player-section">
    <div class="player-name">{{ getPlayerName() }}</div>
    <div class="health-bar-container">
      <div class="health-bar">
        <div class="health-bar-bg"></div>
        <div class="health-bar-fill player-health" [style.width.%]="getPlayerHealthPercent()">
          <div class="health-bar-segments"></div>
        </div>
        <div class="health-bar-damage" [style.width.%]="getPlayerHealthPercent()"></div>
      </div>
    </div>
  </div>

  <!-- Match Timer (Center) -->
  <div class="match-timer-container">
    <div class="match-timer">{{ formatMatchTimer() }}</div>
  </div>

  <!-- Player 2 (Right Side) -->
  <div class="hud-section opponent-section">
    <div class="player-name">{{ getOpponentName() }}</div>
    <div class="health-bar-container">
      <div class="health-bar">
        <div class="health-bar-bg"></div>
        <div class="health-bar-fill opponent-health" [style.width.%]="getOpponentHealthPercent()">
          <div class="health-bar-segments"></div>
        </div>
        <div class="health-bar-damage" [style.width.%]="getOpponentHealthPercent()"></div>
      </div>
    </div>
  </div>
</div>
